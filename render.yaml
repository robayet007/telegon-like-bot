services:
  - type: web
    name: telegon-like-bot
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: API_KEY
        value: BSMQ9T
      - key: MONGODB_DB
        value: ff_like_bot
      - key: MONGODB_STATE_COLLECTION
        value: bot_state
